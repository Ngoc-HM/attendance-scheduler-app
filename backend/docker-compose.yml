# Local dev stack: PostgreSQL + API. For production prefer a managed
# EU/Frankfurt-region PostgreSQL (spec §9.4) and sign a DPA with the provider.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: attendance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    env_file: .env
    depends_on:
      - db
    ports:
      - "8035:8035"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/attendance

volumes:
  pgdata:
