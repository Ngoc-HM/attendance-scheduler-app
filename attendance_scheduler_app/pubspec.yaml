name: attendance_scheduler_app
description: "Attendance & auto-scheduler desktop client (Windows) — Flutter front-end."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  # Networking (talks to the FastAPI backend)
  dio: ^5.5.0
  # Routing
  go_router: ^14.2.0
  # Secure JWT storage
  flutter_secure_storage: ^9.2.2
  # Value equality for entities
  equatable: ^2.0.5
  # Date formatting / i18n
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # NOTE: add these when implementing the related features:
  #   file_picker   -> F-04 Excel flight import
  #   data_table_2  -> schedule grid (person × day)
